name: Auto Merge And Prune

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "auto-merge-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Run merge script
        run: |
          chmod +x ./scripts/auto_merge_and_prune.sh
          ./scripts/auto_merge_and_prune.sh

      - name: Push changes
        run: |
          git push origin main --prune
