name: merge-all

on:
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: fetch branches
        run: |
          git fetch --all --prune

      - name: merge branches into main
        run: |
          TARGET=main

          git checkout $TARGET
          git pull origin $TARGET

          for b in $(git branch -r | grep origin/ | grep -v HEAD | sed 's/origin\///'); do
            if [ "$b" = "$TARGET" ]; then
              continue
            fi

            echo "Attempting merge: $b"

            if git merge origin/$b --no-edit; then
              echo "Merged $b"
            else
              echo "Conflict in $b"
              git merge --abort || true
            fi
          done

      - name: push result
        run: |
          git push origin main

      - name: delete merged branches
        run: |
          for b in $(git branch -r --merged origin/main | grep origin/ | grep -v origin/main | sed 's/origin\///'); do
            echo "Deleting $b"
            git push origin --delete $b
          done
