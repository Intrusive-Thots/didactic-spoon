name: Merge All Branches

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "auto-merge-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Fetch all branches
        run: |
          git fetch --all --prune

      - name: Merge all branches into main
        run: |
          git checkout main
          git pull origin main

          for branch in $(git branch -r | grep origin/ | grep -v 'origin/main' | grep -v 'origin/HEAD'); do
            b=${branch#origin/}

            echo "Attempting merge: $b"

            git checkout main

            if git merge origin/$b --no-edit; then
              echo "Merged $b"
            else
              echo "Conflict in $b — skipping"
              git merge --abort || true
            fi
          done

      - name: Push merged main
        run: |
          git push origin main

      - name: Delete merged branches
        run: |
          git fetch -p
          for branch in $(git branch -r --merged origin/main | grep origin/ | grep -v 'origin/main' | grep -v 'origin/HEAD'); do
            b=${branch#origin/}
            echo "Deleting merged branch $b"
            git push origin --delete $b
          done
