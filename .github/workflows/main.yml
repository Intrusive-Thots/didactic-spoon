name: merge-all-branches

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: Fetch all branches
        run: |
          git fetch --all --prune

      - name: Merge branches
        run: |
          TARGET=main

          git checkout $TARGET
          git pull origin $TARGET

          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/ | sed 's/origin\///'); do

            if [ "$branch" = "$TARGET" ]; then
              continue
            fi

            echo "Trying merge: $branch"

            if git merge origin/$branch --no-edit; then
              echo "Merged $branch"
            else
              echo "Conflict in $branch — skipping"
              git merge --abort || true
            fi

          done

      - name: Push updated main
        run: |
          git push origin main

      - name: Delete merged branches
        run: |
          git fetch -p
          for branch in $(git branch -r --merged origin/main | grep origin/ | grep -v origin/main | sed 's/origin\///'); do
            echo "Deleting $branch"
            git push origin --delete $branch
          done
